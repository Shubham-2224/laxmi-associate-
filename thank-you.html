<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Laxmi Associates</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1a1714 0%, #2a241e 100%);
      color: #fff;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 480px;
      padding: 48px 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 24px;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: linear-gradient(145deg, #d4af37, #b8922a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #1a1714;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem;
      margin-bottom: 12px;
      color: #f0dc8a;
    }
    p { color: rgba(255,255,255,0.75); line-height: 1.7; margin-bottom: 28px; }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(145deg, #d4af37, #b8922a);
      color: #1a1714;
      text-decoration: none;
      font-weight: 600;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Request Received!</h1>
    <p>Thank you for booking a consultation with Laxmi Associates. Our team will contact you within 24 hours.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
